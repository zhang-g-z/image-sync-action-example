name: Sync GROBID Image

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Check secrets
        run: |
          test -n "${{ secrets.ACR_USERNAME }}"
          test -n "${{ secrets.ACR_PASSWORD }}"

      - name: Copy GROBID image to Aliyun ACR
        run: |
          skopeo copy --all \
            --src-creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_PASSWORD }}" \
            --dest-creds "${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}" \
            docker://docker.io/grobid/grobid:0.9.0-full \
            docker://registry.cn-hangzhou.aliyuncs.com/zgz521/grobid:0.9.0-full
